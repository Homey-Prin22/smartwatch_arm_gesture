<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salva Dati</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 20%;
        }
        .button-container {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
        }
        .accept {
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        .reject {
            background-color: #f44336;
            color: white;
            border: none;
        }
    </style>
</head>
<body>
    <h2>Ciao, {{ current_user.userid }}!</h2>
    <a href="{{ url_for('logout') }}">Logout</a>

    <h2>Vuoi salvare i dati acquisiti per la gesture corrente?</h2>
    <!--<img src="{{ url_for('static', filename=image_fn) }}" alt="Flask Image" width="300">-->
    <div class="button-container">
        <button class="accept" onclick="sendAction('accept')">Accetta</button>
        <button class="reject" onclick="sendAction('reject')">Rifiuta</button>
    </div>
    
    <script>
        function sendAction(action) {
            fetch('/process_action', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ action: action })
            })
            .then(response => response.json())
            .then(data => alert(data.message))
            .catch(error => console.error('Errore:', error));
        }
    </script>
</body>
</html>
